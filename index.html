<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .movie-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="p-8">
    <div id="app" class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-extrabold text-red-500 tracking-tight">🎬 MOVIE SELECTION</h1>
            <p class="text-gray-400 mt-2">Curated categories and previews</p>
        </header>

        <div id="movie-content">
            <!-- Data will be injected here -->
        </div>
    </div>

    <div id="movie-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-gray-900 border border-gray-700 w-full max-w-2xl rounded-2xl overflow-hidden relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl z-10">&times;</button>
            
            <div id="modal-body" class="flex flex-col md:flex-row">
                </div>
        </div>
    </div>

    <script>
        function showMovieDetails(name, image, theme, info) {
            const modal = document.getElementById('movie-modal');
            const modalBody = document.getElementById('modal-body');

            modalBody.innerHTML = `
                <div class="w-full md:w-1/3">
                    <img src="${image}" class="w-full h-full object-cover" alt="${name}">
                </div>
                <div class="p-8 md:w-2/3">
                    <span class="text-red-500 font-bold uppercase tracking-widest text-xs">${theme}</span>
                    <h2 class="text-3xl font-extrabold text-white mt-2 mb-4">${name}</h2>
                    <p class="text-gray-300 leading-relaxed">${info}</p>
                    <button onclick="closeModal()" class="mt-8 bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-bold transition">Close Preview</button>
                </div>
            `;

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Prevent scrolling background
        }

        function closeModal() {
            const modal = document.getElementById('movie-modal');
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto'; // Re-enable scrolling
        }

        // Optional: Close modal when clicking outside the box
        window.onclick = function(event) {
            const modal = document.getElementById('movie-modal');
            if (event.target == modal) {
                closeModal();
            }
        }
        
        async function loadMovies() {
            try {
                const response = await fetch('movies.json');
                const data = await response.json();
                const container = document.getElementById('movie-content');

                data.categories.forEach(cat => {
                    const section = document.createElement('section');
                    section.className = 'mb-16';
                    section.innerHTML = `<h2 class="text-2xl font-bold mb-6 border-l-4 border-red-500 pl-4 uppercase tracking-widest text-gray-200">${cat.category_name}</h2>`;

                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8';

                    cat.movies.forEach(movie => {
                        // Inside your cat.movies.forEach loop:
                        grid.innerHTML += `
                            <div onclick="showMovieDetails('${movie.name}', '${movie.image}', '${movie.theme}', '${movie.info.replace(/'/g, "\\'")}')" 
                                class="movie-card cursor-pointer bg-gray-800 rounded-xl overflow-hidden shadow-2xl flex flex-col h-full border border-gray-700">
                                <img src="${movie.image}" alt="${movie.name}" class="w-full aspect-[2/3] object-cover">
                                </div>
                        `;
                    });

                    section.appendChild(grid);
                    container.appendChild(section);
                });
            } catch (err) {
                console.error("Error loading JSON:", err);
                document.getElementById('movie-content').innerHTML = '<div class="text-center text-red-400 py-10">Error: Please ensure movies.json exists in the same folder.</div>';
            }
        }
        loadMovies();
    </script>
</body>
</html>
