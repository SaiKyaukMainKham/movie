<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyauk Movie Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .movie-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="p-8">
    <div id="app" class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-extrabold text-red-500 tracking-tight">💘သဲလေးတွက် MOVIE SELECTION💘</h1>
            <p class="text-gray-400 mt-2">သဲလေးနဲ့ အတူတူ Netflixမှာ ကြည့်မယ့် ဇာတ်ကားလေးတွေပါ</p>
        </header>

        <div id="movie-content">
            <!-- Data will be injected here -->
        </div>
    </div>

    <div id="movie-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
    <div class="bg-gray-900 border border-gray-700 w-full max-w-2xl rounded-2xl shadow-2xl relative flex flex-col max-h-[90vh]">
            
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-3xl z-50 bg-gray-900/50 rounded-full w-10 h-10 flex items-center justify-center border border-gray-700">
                &times;
            </button>
            
            <div id="modal-body" class="overflow-y-auto custom-scrollbar flex flex-col md:flex-row">
                </div>
        </div>
    </div>

    <style>
        /* Optional: Make the scrollbar look nicer in the modal */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>

    <script>
        // Edit the function line to include netflix_url
        function showMovieDetails(name, image, theme, info, netflix_url) {
            const modal = document.getElementById('movie-modal');
            const modalBody = document.getElementById('modal-body');

            modalBody.innerHTML = `
                <div class="w-full md:w-1/2 shrink-0">
                    <img src="${image}" class="w-full h-auto md:h-full object-cover" alt="${name}">
                </div>
                
                <div class="p-8 md:w-1/2 flex flex-col">
                    <span class="text-red-500 font-bold uppercase tracking-widest text-xs">${theme}</span>
                    <h2 class="text-3xl font-extrabold text-white mt-2 mb-4 leading-tight">${name}</h2>
                    
                    <div class="text-gray-300 leading-relaxed space-y-4 mb-6">
                        <p>${info}</p>
                    </div>

                    <a href="${netflix_url}" target="_blank" class="flex items-center justify-center gap-2 bg-[#E50914] hover:bg-[#b20710] text-white px-6 py-3 rounded-lg font-bold transition-all mb-3 text-center">
                        <span>▶</span> Watch on Netflix
                    </a>

                    <button onclick="closeModal()" class="mb-4 bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-bold transition-all transform hover:scale-105">
                        Close Preview
                    </button>
                </div>
            `;

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() {
            const modal = document.getElementById('movie-modal');
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto'; // Re-enable scrolling
        }

        // Optional: Close modal when clicking outside the box
        window.onclick = function(event) {
            const modal = document.getElementById('movie-modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        async function loadMovies() {
            try {
                const response = await fetch('movies.json');
                const data = await response.json();
                const container = document.getElementById('movie-content');

                data.categories.forEach(cat => {
                    const section = document.createElement('section');
                    section.className = 'mb-16';
                    section.innerHTML = `<h2 class="text-2xl font-bold mb-6 border-l-4 border-red-500 pl-4 uppercase tracking-widest text-gray-200">${cat.category_name}</h2>`;

                    const grid = document.createElement('div');
                    grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8';

                    cat.movies.forEach(movie => {
                        grid.innerHTML += `
                            <div onclick="showMovieDetails('${movie.name}', '${movie.image}', '${movie.theme}', '${movie.info.replace(/'/g, "\\'")}', '${movie.netflix_url}')" 
                                class="movie-card cursor-pointer bg-gray-800 rounded-xl overflow-hidden shadow-2xl flex flex-col h-full border border-gray-700">
                                <img src="${movie.image}" alt="${movie.name}" class="w-full aspect-[2/3] object-cover">
                            </div>
                        `;
                    });

                    section.appendChild(grid);
                    container.appendChild(section);
                });
            } catch (err) {
                console.error("Error loading JSON:", err);
                document.getElementById('movie-content').innerHTML = '<div class="text-center text-red-400 py-10">Error: Please ensure movies.json exists in the same folder.</div>';
            }
        }
        loadMovies();
    </script>
</body>
</html>
